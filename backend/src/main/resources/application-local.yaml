spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aiverse}
    username: ${SPRING_DATASOURCE_USERNAME:aiverse}
    password: ${SPRING_DATASOURCE_PASSWORD:aiverse}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

app:
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin123}
    bucket: ${STORAGE_BUCKET:aiverse-local}
  jwt:
    secret-key: ${JWT_SECRET_KEY:local-only-dev-secret-key-change-me-please-0123456789}
